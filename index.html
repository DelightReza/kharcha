<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kharcha Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen p-4">

<div class="max-w-4xl mx-auto">

  <!-- Header -->
  <header class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">Kharcha Dashboard</h1>
    <button id="loginBtn" class="px-4 py-2 bg-blue-500 text-white rounded">Login</button>
  </header>

  <!-- Summary -->
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow">
      <h2 class="font-bold text-gray-700">Total Credits</h2>
      <p id="totalCredits" class="text-2xl">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h2 class="font-bold text-gray-700">Total Debits</h2>
      <p id="totalDebits" class="text-2xl">0</p>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h2 class="font-bold text-gray-700">Balance</h2>
      <p id="balance" class="text-2xl">0</p>
    </div>
  </div>

  <!-- Transaction Table -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="font-bold mb-2">Transactions</h2>
    <table class="w-full table-auto border-collapse border border-gray-300">
      <thead>
        <tr class="bg-gray-200">
          <th class="border px-2 py-1">Date</th>
          <th class="border px-2 py-1">Person / Bill</th>
          <th class="border px-2 py-1">Type</th>
          <th class="border px-2 py-1">Amount</th>
        </tr>
      </thead>
      <tbody id="txTable">
        <!-- Filled dynamically -->
      </tbody>
    </table>
  </div>

  <!-- Admin Panel (Hidden initially) -->
  <div id="adminPanel" class="hidden bg-white p-4 rounded shadow mb-6">
    <h2 class="font-bold mb-4">Admin Controls</h2>

    <!-- Add Credit -->
    <div class="mb-4">
      <h3 class="font-semibold mb-2">Add Credit</h3>
      <form id="creditForm" class="flex gap-2 items-center">
        <select id="creditPerson" class="border p-1 rounded">
          <option>Raza</option>
          <option>Salman</option>
          <option>Mujeeb</option>
          <option>Gulam</option>
          <option>Rana</option>
          <option>Naved</option>
          <option>Musawwar</option>
          <option>Nizamuddin</option>
        </select>
        <input type="number" id="creditAmount" placeholder="Amount" class="border p-1 rounded w-24" required>
        <button type="submit" class="px-3 py-1 bg-green-500 text-white rounded">Add</button>
      </form>
    </div>

    <!-- Add Debit -->
    <div>
      <h3 class="font-semibold mb-2">Add Debit</h3>
      <form id="debitForm" class="flex gap-2 items-center">
        <select id="debitType" class="border p-1 rounded">
          <option>Electricity</option>
          <option>Water</option>
          <option>Gas</option>
          <option>Garbage</option>
          <option>Other</option>
        </select>
        <input type="text" id="debitNote" placeholder="Note (optional)" class="border p-1 rounded w-32">
        <input type="number" id="debitAmount" placeholder="Amount" class="border p-1 rounded w-24" required>
        <button type="submit" class="px-3 py-1 bg-red-500 text-white rounded">Add</button>
      </form>
    </div>

    <!-- Commit Button -->
    <div class="mt-4">
      <button id="commitBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Commit to GitHub</button>
    </div>
  </div>

</div>

<script>
const repoOwner = "delightreza";
const repoName = "kharcha";
const filePath = "data.json";

// Sample initial data (used if fetch fails)
let data = {
  people: {
    "Raza": 0,"Salman":0,"Mujeeb":0,"Gulam":0,"Rana":0,"Naved":0,"Musawwar":0,"Nizamuddin":0
  },
  transactions: []
};

// Load data.json from GitHub
async function loadData() {
  try {
    const rawUrl = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/${filePath}`;
    const res = await fetch(rawUrl);
    if(res.ok) data = await res.json();
  } catch(err) {
    console.log("Using default data", err);
  }
  renderDashboard();
}

// Render dashboard totals and transactions
function renderDashboard() {
  const totalCredits = data.transactions.filter(t=>t.type==="Credit").reduce((a,b)=>a+b.amount,0);
  const totalDebits = data.transactions.filter(t=>t.type==="Debit").reduce((a,b)=>a+b.amount,0);
  document.getElementById("totalCredits").textContent = totalCredits;
  document.getElementById("totalDebits").textContent = totalDebits;
  document.getElementById("balance").textContent = totalCredits - totalDebits;

  const txTable = document.getElementById("txTable");
  txTable.innerHTML = "";
  data.transactions.forEach(tx=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="border px-2 py-1">${tx.date}</td>
                    <td class="border px-2 py-1">${tx.person || tx.bill}</td>
                    <td class="border px-2 py-1">${tx.type}</td>
                    <td class="border px-2 py-1">${tx.amount}</td>`;
    txTable.appendChild(tr);
  });
}

// Admin login simulation
document.getElementById("loginBtn").addEventListener("click", ()=>{
  const username = prompt("Enter your GitHub username to unlock admin controls:");
  if(username === "delightreza"){
    document.getElementById("adminPanel").classList.remove("hidden");
    alert("Admin controls unlocked!");
  } else {
    alert("Access denied");
  }
});

// Add Credit
document.getElementById("creditForm").addEventListener("submit", e=>{
  e.preventDefault();
  const person = document.getElementById("creditPerson").value;
  const amount = parseFloat(document.getElementById("creditAmount").value);
  const date = new Date().toISOString().split('T')[0];
  data.transactions.push({type:"Credit", person, amount, date});
  data.people[person] += amount;
  renderDashboard();
});

// Add Debit
document.getElementById("debitForm").addEventListener("submit", e=>{
  e.preventDefault();
  const bill = document.getElementById("debitType").value;
  const note = document.getElementById("debitNote").value;
  const amount = parseFloat(document.getElementById("debitAmount").value);
  const date = new Date().toISOString().split('T')[0];
  data.transactions.push({type:"Debit", bill: bill + (note?` (${note})`:""), amount, date});
  renderDashboard();
});

// Commit URL generator
document.getElementById("commitBtn").addEventListener("click", ()=>{
  const jsonContent = encodeURIComponent(JSON.stringify(data, null, 2));
  const commitMessage = encodeURIComponent("Update kharcha data");
  const githubUrl = `https://github.com/${repoOwner}/${repoName}/edit/main/${filePath}?message=${commitMessage}`;
  window.open(githubUrl, "_blank");
});

loadData();
</script>

</body>
</html>
