<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f4f6; background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,.1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,.1) 0, transparent 50%); }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-10">
    
    <!-- Glass Header -->
    <nav class="sticky top-0 z-50 glass-panel border-b border-white/30 mb-8">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/30">
                    <i class="fas fa-wallet text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight tracking-tight text-slate-900">Kharcha</h1>
                    <p class="text-xs text-slate-500 font-medium">House Fund</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold bg-slate-100 px-2 py-1 rounded-md">
                    22:29 UTC+6
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 animate-fade-in">
        
<div class="max-w-xl mx-auto mt-10">
    
    <div class="mb-6">
        <a href="../index.html" class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-brand-600 transition-colors">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <!-- Receipt Card -->
    <div class="glass-card rounded-3xl overflow-hidden shadow-2xl shadow-slate-200/50">
        
        <!-- Top Half -->
        <div class="p-8 text-center relative bg-white">
            <div class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl
                bg-emerald-50 text-emerald-600">
                <i class="fas fa-check"></i>
            </div>
            
            <p class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-2">
                Money Received
            </p>
            <h1 class="text-4xl font-extrabold text-slate-800 mb-1">
                1,000.00
            </h1>
            <p class="text-sm text-slate-400">SOM</p>

            <!-- Decorative Circles -->
            <div class="absolute -bottom-3 -left-3 w-6 h-6 bg-[#f3f4f6] rounded-full"></div>
            <div class="absolute -bottom-3 -right-3 w-6 h-6 bg-[#f3f4f6] rounded-full"></div>
        </div>

        <!-- Dashed Divider -->
        <div class="relative w-full h-px border-t-2 border-dashed border-slate-200 bg-white"></div>

        <!-- Details -->
        <div class="p-8 bg-slate-50/50">
            <div class="space-y-4">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Subject</span>
                    <span class="font-bold text-slate-800">Nizamuddin</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Date</span>
                    <span class="font-medium text-slate-700">2025-11-27 22:19</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Transaction ID</span>
                    <span class="font-mono text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded">_5gwky</span>
                </div>
                
                

                
            </div>
        </div>
    </div>
</div>

    </main>

    <footer class="mt-16 text-center text-slate-400 text-sm">
        <p class="flex items-center justify-center gap-2">
            Made with <i class="fas fa-heart text-red-400"></i> by the House
        </p>
    </footer>
</body>
</html>
