name: Build Signed Android APK

on:
  push:
    branches: [ "app" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # FIXED: Install Gradle automatically since 'gradlew' is missing
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    # 1. Decode the Keystore Base64 to a file
    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/upload-keystore.jks"

    # 2. Build Release APK (Using 'gradle' instead of './gradlew')
    - name: Build Release APK
      env:
        KEYSTORE_PATH: "${{ runner.temp }}/upload-keystore.jks"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: gradle assembleRelease

    # 3. Upload the Signed APK
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Kharcha-Signed-Release
        path: app/build/outputs/apk/release/app-release.apk
