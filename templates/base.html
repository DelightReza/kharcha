<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_title }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f4f6; background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,.1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,.1) 0, transparent 50%); }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-10">
    
    <!-- Glass Header -->
    <nav class="sticky top-0 z-50 glass-panel border-b border-white/30 mb-8">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/30">
                    <i class="fas fa-wallet text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight tracking-tight text-slate-900">{{ site_title }}</h1>
                    <p class="text-xs text-slate-500 font-medium">{{ site_subtitle }}</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold bg-slate-100 px-2 py-1 rounded-md">
                    {{ last_updated.split(' ')[1] }} {{ last_updated.split(' ')[2] }}
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 animate-fade-in">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-16 text-center text-slate-400 text-sm">
        <p class="flex items-center justify-center gap-2">
            Made with <i class="fas fa-heart text-red-400"></i> by the House
        </p>
    </footer>
</body>
</html>
